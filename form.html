<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Fill Your Details</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html">Browse Laptops</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="form.html">Form</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <form id="checkout-form">
      <label>Name: <input type="text" name="name" required></label><br>
      <label>Student ID: <input type="text" name="studentid" required></label><br>
      <label>Email: <input type="email" name="email" required></label><br>
      <label>Phone: <input type="text" name="phone" required></label><br>
      <label>Bank Details: <input type="text" name="bank" required></label><br>
      <button type="submit">Send via WhatsApp</button>
    </form>
  </main>

  <script>
    document.getElementById('checkout-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      let message = "Laptop Purchase Request:\n";
      for (let [key, value] of formData.entries()) {
        message += `${key}: ${value}\n`;
      }
      window.open(`https://wa.me/<YOUR_NUMBER>?text=${encodeURIComponent(message)}`, '_blank');
    });
  </script>
</body>
</html>
